name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check tag
        run: git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Compile check
        run: python3 -m py_compile sfe.py sfe_core.py scripts/build_deb.py

      - name: Check runtime glibc compatibility and build package
        run: |
          python3 scripts/build_deb.py --root . --architecture "${{ matrix.arch }}" --check-glibc --max-glibc 2.35
          cp "dist/sfe_${{ steps.version.outputs.version }}_${{ matrix.arch }}.deb" "dist/sfe_latest_${{ matrix.arch }}.deb"
          sha256sum "dist/sfe_${{ steps.version.outputs.version }}_${{ matrix.arch }}.deb" "dist/sfe_latest_${{ matrix.arch }}.deb"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfe-${{ matrix.arch }}
          path: |
            dist/sfe_${{ steps.version.outputs.version }}_${{ matrix.arch }}.deb
            dist/sfe_latest_${{ matrix.arch }}.deb

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check tag
        run: git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Add compatibility latest alias
        run: |
          cp "dist/sfe_latest_amd64.deb" dist/sfe_latest_all.deb
          sha256sum dist/*.deb

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          ## Changes
          - Make :files and Ctrl-P open a filterable project file picker.
          - Add quick character locate in the project tree and preserve selection across refreshes.
          - Show the current git branch in the status bar when it can be read quickly.
          - Reuse cached project file scans across files, tree, and fuzzy open.
          - Restrict release publishing to tag pushes to avoid main/tag workflow races.

          ## Verification
          - python3 -m unittest discover -s tests
          - python3 -m py_compile sfe.py sfe_core.py scripts/build_deb.py
          EOF
          if ! gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.version.outputs.tag }}" \
              --title "${{ steps.version.outputs.tag }}" \
              --notes-file release-notes.md
          fi
          for asset in \
            "dist/sfe_${{ steps.version.outputs.version }}_amd64.deb" \
            "dist/sfe_${{ steps.version.outputs.version }}_arm64.deb" \
            "dist/sfe_latest_amd64.deb" \
            "dist/sfe_latest_arm64.deb" \
            "dist/sfe_latest_all.deb"
          do
            gh release upload "${{ steps.version.outputs.tag }}" "$asset" --clobber
          done
          for asset in \
            "sfe_${{ steps.version.outputs.version }}_amd64.deb" \
            "sfe_${{ steps.version.outputs.version }}_arm64.deb" \
            "sfe_latest_amd64.deb" \
            "sfe_latest_arm64.deb" \
            "sfe_latest_all.deb"
          do
            gh release view "${{ steps.version.outputs.tag }}" --json assets --jq ".assets[].name" | grep -Fx "$asset"
          done
