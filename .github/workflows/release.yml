name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check tag
        run: git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.existing.outputs.exists == 'false'
        run: python3 -m unittest discover -s tests

      - name: Compile check
        if: steps.existing.outputs.exists == 'false'
        run: python3 -m py_compile sfe.py sfe_core.py scripts/build_deb.py

      - name: Check runtime glibc compatibility and build package
        if: steps.existing.outputs.exists == 'false'
        run: |
          python3 scripts/build_deb.py --root . --architecture "${{ matrix.arch }}" --check-glibc --max-glibc 2.35
          cp "dist/sfe_${{ steps.version.outputs.version }}_${{ matrix.arch }}.deb" "dist/sfe_latest_${{ matrix.arch }}.deb"
          sha256sum "dist/sfe_${{ steps.version.outputs.version }}_${{ matrix.arch }}.deb" "dist/sfe_latest_${{ matrix.arch }}.deb"

      - name: Upload package artifact
        if: steps.existing.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sfe-${{ matrix.arch }}
          path: |
            dist/sfe_${{ steps.version.outputs.version }}_${{ matrix.arch }}.deb
            dist/sfe_latest_${{ matrix.arch }}.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check tag
        run: git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download package artifacts
        if: steps.existing.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Add compatibility latest alias
        if: steps.existing.outputs.exists == 'false'
        run: |
          cp "dist/sfe_latest_amd64.deb" dist/sfe_latest_all.deb
          sha256sum dist/*.deb

      - name: Create release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          ## Changes
          - Speed up installed startup by preferring /usr/bin/python3 -B -S instead of cold-starting the bundled Python runtime every time.
          - Keep the bundled Python runtime as an automatic fallback when system Python or curses is unavailable.
          - Only add bundled native library paths when the bundled runtime is actually selected.
          - Add regression coverage for the launcher fast path and bundled fallback behavior.

          ## Verification
          - python3 -m unittest discover -s tests
          - python3 -m py_compile sfe.py sfe_core.py scripts/build_deb.py
          EOF
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/sfe_${{ steps.version.outputs.version }}_amd64.deb" \
            "dist/sfe_${{ steps.version.outputs.version }}_arm64.deb" \
            "dist/sfe_latest_amd64.deb" \
            "dist/sfe_latest_arm64.deb" \
            "dist/sfe_latest_all.deb" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md
